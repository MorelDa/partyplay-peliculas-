<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PARTY PLAY | Cine & Series</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@300;400;600&family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        :root { 
            --primary: #ff2d75; 
            --brand: #e50914;
            --bg: #0a0a0b; 
            --card-bg: #161618; 
            --text: #ffffff;
        }

        body { 
            margin: 0; padding: 0; background: var(--bg); color: var(--text); 
            font-family: 'Poppins', sans-serif; overflow-x: hidden;
        }

        /* --- ESTILOS HOME --- */
        header { 
            position: fixed; top: 0; width: 100%; padding: 15px 5%;
            display: flex; align-items: center; z-index: 1000;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            transition: 0.4s;
        }
        .logo-box { background: var(--primary); padding: 6px 15px; border-radius: 6px; cursor: pointer; }
        .logo-img { height: 30px; }
        .search-container { margin-left: 20px; flex-grow: 1; max-width: 400px; }
        .search-bar { 
            width: 100%; padding: 10px 20px; border-radius: 50px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(10px);
            color: white; outline: none;
        }

        .hero-wrapper { width: 100%; height: 85vh; position: relative; }
        .main-slider { height: 100%; }
        .swiper-slide-hero { position: relative; overflow: hidden; background: #000; }
        .hero-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to top, var(--bg) 10%, transparent 70%); }
        .hero-info { position: absolute; bottom: 15%; left: 5%; z-index: 10; max-width: 600px; }
        .hero-info h2 { font-family: 'Orbitron'; font-size: clamp(2rem, 5vw, 4rem); margin: 0 0 20px; }
        
        .row-title { font-family: 'Orbitron'; font-size: 1.1rem; margin: 40px 0 15px 5%; color: #eee; }
        .movie-card { width: 170px; transition: 0.4s; cursor: pointer; }
        .movie-card:hover { transform: scale(1.1); z-index: 10; }
        .poster-container { width: 100%; aspect-ratio: 2/3; border-radius: 6px; overflow: hidden; border: 1px solid #222; }
        .poster-container img { width: 100%; height: 100%; object-fit: cover; }
        .movie-info { padding: 8px 0; font-size: 0.8rem; text-align: center; }

        /* --- ESTILOS PLAYER (VISTA DETALLE) --- */
        #movie-detail {
            display: none; position: fixed; inset: 0; background: #141414; z-index: 2000;
            overflow-y: auto; padding-bottom: 50px;
        }
        .detail-hero {
            position: relative; height: 70vh; width: 100%;
            display: flex; align-items: center; padding: 0 5%;
            background-size: cover !important; background-position: center !important;
        }
        .detail-content { max-width: 700px; z-index: 10; }
        .detail-hero::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(to right, #141414 10%, transparent 90%),
                        linear-gradient(to top, #141414 0%, transparent 20%);
        }
        .btn-play-big { 
            background: white; color: black; padding: 12px 30px; border-radius: 4px;
            font-weight: bold; border: none; cursor: pointer; display: flex; align-items: center; gap: 10px;
        }

        /* --- ESTILOS OVERLAY PLAYER --- */
        #player-overlay { position: fixed; inset: 0; background: #000; z-index: 3000; display: none; flex-direction: column; }
        .player-frame { flex: 1; border: none; }

        @media (max-width: 768px) {
            .movie-card { width: 130px; }
            .hero-wrapper { height: 60vh; }
        }
    </style>
</head>
<body>

    <header id="navbar">
        <div class="logo-box" onclick="window.location.reload()">
            <img src="https://i.postimg.cc/7hgdMS6K/Picsart-24-08-01-00-13-45-109.png" class="logo-img">
        </div>
        <div class="search-container">
            <input type="text" id="searchInput" class="search-bar" placeholder="Buscar película..." onkeyup="filterAll()">
        </div>
    </header>

    <div id="app">
        <div id="loading" style="text-align: center; padding: 200px 0; font-family: 'Orbitron'; color: var(--primary);">CARGANDO...</div>
        
        <div id="home-content" style="display:none">
            <div class="hero-wrapper">
                <div class="swiper main-slider">
                    <div class="swiper-wrapper" id="sliderContent"></div>
                </div>
            </div>
            <main id="sections"></main>
        </div>
    </div>

    <div id="movie-detail">
        <button onclick="closeDetail()" style="position:fixed; top:20px; right:20px; z-index:100; background:rgba(0,0,0,0.5); color:white; border:none; border-radius:50%; width:40px; height:40px; cursor:pointer;">✕</button>
        <div id="detail-body"></div>
    </div>

    <div id="player-overlay">
        <div style="padding: 15px; display: flex; align-items: center; gap: 20px; background: #000;">
            <button onclick="closePlayer()" style="background:none; border:none; color:white; font-size:25px; cursor:pointer;">✕ Volver</button>
            <span id="player-title" style="font-weight:bold;"></span>
        </div>
        <iframe id="main-frame" class="player-frame" src="" allowfullscreen></iframe>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        let allData = [];

        async function init() {
            try {
                const r = await fetch('datos.json?v=' + Math.random());
                allData = await r.json();
                renderHome(allData);
            } catch (e) { document.getElementById('loading').innerText = "ERROR DE CONEXIÓN"; }
        }

        function renderHome(pelis) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('home-content').style.display = 'block';

            // Slider
            const destacados = pelis.filter(p => p.enSlider);
            document.getElementById('sliderContent').innerHTML = destacados.map((p, i) => `
                <div class="swiper-slide swiper-slide-hero">
                    <img src="${p.imgBanner || p.img}" class="hero-img">
                    <div class="hero-overlay"></div>
                    <div class="hero-info">
                        <h2>${p.titulo}</h2>
                        <button class="btn-play-big" onclick="openDetail('${p.titulo}')">▶ VER AHORA</button>
                    </div>
                </div>
            `).join('');
            new Swiper('.main-slider', { loop: true, autoplay: { delay: 5000 } });

            // Secciones por Etiquetas
            const main = document.getElementById('sections');
            const categorias = [...new Set(pelis.flatMap(p => p.etiquetas || ["Otros"]))];
            
            main.innerHTML = ""; // Limpiar
            categorias.forEach((cat, idx) => {
                const filtradas = pelis.filter(p => (p.etiquetas || []).includes(cat));
                const row = document.createElement('div');
                row.className = "category-row";
                row.innerHTML = `
                    <h2 class="row-title">${cat}</h2>
                    <div class="swiper listado-container" id="row-${idx}">
                        <div class="swiper-wrapper">
                            ${filtradas.map(p => `
                                <div class="swiper-slide movie-card" onclick="openDetail('${p.titulo}')">
                                    <div class="poster-container">
                                        <img src="${p.img}" loading="lazy">
                                    </div>
                                    <div class="movie-info"><span>${p.titulo}</span></div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                main.appendChild(row);
                new Swiper(`#row-${idx}`, { slidesPerView: 'auto', spaceBetween: 15, freeMode: true });
            });
        }

        // --- LÓGICA DE NAVEGACIÓN INTERNA ---

        function openDetail(titulo) {
            const p = allData.find(m => m.titulo === titulo);
            if(!p) return;

            const detailBody = document.getElementById('detail-body');
            detailBody.innerHTML = `
                <div class="detail-hero" style="background: url('${p.imgBanner || p.img}')">
                    <div class="detail-content">
                        <h1 style="font-size:3rem; margin-bottom:10px;">${p.titulo}</h1>
                        <div style="margin-bottom:20px; color:#46d369; font-weight:bold;">
                            ${p.year} • ${p.etiquetas.join(', ')}
                        </div>
                        <p style="font-size:1.1rem; line-height:1.6; margin-bottom:30px;">${p.sinopsis}</p>
                        <button class="btn-play-big" onclick="playVideo('${p.url}', '${p.titulo}')">
                            ▶ REPRODUCIR AHORA
                        </button>
                    </div>
                </div>
            `;
            document.getElementById('movie-detail').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeDetail() {
            document.getElementById('movie-detail').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function playVideo(url, titulo) {
            document.getElementById('player-title').innerText = titulo;
            document.getElementById('main-frame').src = url;
            document.getElementById('player-overlay').style.display = 'flex';
        }

        function closePlayer() {
            document.getElementById('player-overlay').style.display = 'none';
            document.getElementById('main-frame').src = '';
        }

        function filterAll() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.movie-card').forEach(c => {
                const title = c.querySelector('span').innerText.toLowerCase();
                c.style.display = title.includes(q) ? "block" : "none";
            });
        }

        window.onload = init;
    </script>
</body>
</html>
